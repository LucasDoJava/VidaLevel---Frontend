version: "3.9"

services:

  frontend:
    build: .
    container_name: react_frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  jenkins:
    build: ./jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
